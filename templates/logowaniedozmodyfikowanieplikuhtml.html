<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje dokumenty</title>
    <link rel="stylesheet" href="/static/css/logowaniedozmodyfikowanieplikuhtml.css">
</head>
<body>
    <div class="container">
        <div class="section-header">
            <h1 class="section-title">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 0 24 24" width="24px" fill="#000000">
                    <path d="M0 0h24v24H0V0z" fill="none" />
                    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM17 8H7v2h10V8zm-1 4H7v2h9v-2z" />
                </svg>
                Moje dokumenty
            </h1>
        </div>

        <div class="file-list" id="fileList">
            <div class="file-item">
                <span class="file-name">
                    <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 0 24 24" width="20px" fill="#000000">
                        <path d="M0 0h24v24H0V0z" fill="none" />
                        <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z" />
                    </svg>
                    Logowanie (nowy mObywatel)
                </span>
                <a href="/static/new/login.html" class="file-link">Otwórz</a>
            </div>
        </div>

        <div class="button-group">
            <button onclick="goBack()" class="action-button">Powrót</button>
        </div>

        <!-- Ukryty stary mObywatel — kliknij "Powrót" 5 razy szybko -->
        <div id="hidden-old-login" class="file-item" style="display:none; margin-top:12px;">
            <span class="file-name">
                <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 0 24 24" width="20px" fill="#000000">
                    <path d="M0 0h24v24H0V0z" fill="none" />
                    <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z" />
                </svg>
                Logowanie (stary mObywatel)
            </span>
            <a href="/static/logowanie.html" class="file-link">Otwórz</a>
        </div>
    </div>

    <script>
        function goBack() {
            window.history.back();
        }

        (function() {
            var clicks = 0;
            var timer = null;
            var btn = document.querySelector('.action-button');
            btn.addEventListener('click', function(e) {
                clicks++;
                if (clicks >= 5) {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    document.getElementById('hidden-old-login').style.display = '';
                    clicks = 0;
                    clearTimeout(timer);
                    return;
                }
                clearTimeout(timer);
                timer = setTimeout(function() { clicks = 0; }, 1500);
            });
        })();
    </script>
</body>
</html>
