<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odzyskiwanie hasła</title>
    <link rel="stylesheet" href="/static/css/recover_password_page.css">
    <script src="/static/js/page-transitions.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Odzyskiwanie hasła</h1>
            <p>Wpisz nazwę użytkownika, token odzyskiwania i nowe hasło.</p>
        </div>

        <div class="alert alert-success" id="successAlert"></div>
        <div class="alert alert-error" id="errorAlert"></div>

        <form id="recoverPasswordForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token_func() }}"/>
            <div class="form-group">
                <label for="username">Nazwa użytkownika:</label>
                <input type="text" id="username" name="username" required
                       placeholder="Wpisz nazwę użytkownika">
            </div>

            <div class="form-group">
                <label for="recovery_token">Token Odzyskiwania:</label>
                <input type="text" id="recovery_token" name="recovery_token" required
                       placeholder="Wpisz token odzyskiwania">
            </div>

            <div class="form-group">
                <label for="new_password">Nowe Hasło:</label>
                <input type="password" id="new_password" name="new_password" required
                       autocomplete="new-password"
                       placeholder="Wpisz nowe hasło">
            </div>

            <div class="form-group">
                <label for="confirm_password">Potwierdź Nowe Hasło:</label>
                <input type="password" id="confirm_password" name="confirm_password" required
                       autocomplete="new-password"
                       placeholder="Potwierdź nowe hasło">
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Odzyskiwanie hasła...</p>
            </div>

            <button type="submit" class="btn" id="submitBtn">Odzyskaj Hasło</button>
        </form>

        <div class="links">
            <a href="/login">Wróć do logowania</a>
        </div>
    </div>

    <script src="/static/js/recover_password.js?v=1" defer></script>
</body>
</html>
