<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token_func() }}">
    <title>Logowanie administratora</title>
    <link rel="stylesheet" href="/static/css/admin_login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="admin-icon">Admin</div>
            <h1>Panel Administracyjny</h1>
            <p>Wprowadź dane logowania</p>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="loginForm">
        <input type="hidden" name="csrf_token" value="{{ csrf_token_func() }}"/>
            <div class="form-group">
                <label for="username">Nazwa użytkownika:</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Hasło:</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>

            <button type="submit" id="loginBtn" class="login-btn">
                Zaloguj się
            </button>
        </form>

        <div class="back-link">
            <a href="/">Wróć do strony głównej</a>
        </div>
    </div>

    <script src="/static/js/admin_login.js?v=1" defer></script>
</body>
</html>
