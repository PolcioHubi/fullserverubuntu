<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token_func() }}">
    <title>Reset hasła</title>
    <link rel="stylesheet" href="/static/css/forgot_password_page.css">
    <script src="/static/js/page-transitions.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Reset hasła</h1>
            <p>Wpisz nazwę użytkownika, aby rozpocząć reset hasła.</p>
        </div>

        <div class="alert alert-success" id="successAlert"></div>
        <div class="alert alert-error" id="errorAlert"></div>

        <form id="forgotPasswordForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token_func() }}"/>
            <div class="form-group">
                <label for="username">Nazwa użytkownika:</label>
                <input type="text" id="username" name="username" required
                       placeholder="Wpisz nazwę użytkownika">
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Wysyłanie...</p>
            </div>

            <button type="submit" class="btn" id="submitBtn">Wyślij link do resetowania</button>
        </form>

        <div class="links">
            <a href="/login">Wróć do logowania</a>
        </div>
    </div>

    <script src="/static/js/forgot_password.js?v=1" defer></script>
</body>
</html>
