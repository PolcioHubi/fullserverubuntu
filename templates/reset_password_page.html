<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset hasła</title>
    <link rel="stylesheet" href="/static/css/recover_password_page.css">
    <link rel="stylesheet" href="/static/css/csp-inline-utilities.css?v=1">
    <script src="/static/js/page-transitions.js" defer></script>
    <script src="/static/js/reset_password.js?v=1" defer></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Reset hasła</h1>
            <p>Wpisz token resetu (otrzymany e-mailem) oraz nowe hasło.</p>
        </div>

        <div class="alert alert-success" id="successAlert"></div>
        <div class="alert alert-error" id="errorAlert"></div>

        <form id="resetPasswordForm">
            <input type="hidden" name="csrf_token" value="{{ csrf_token_func() }}"/>
            <div class="form-group">
                <label for="token">Token resetu:</label>
                <input type="text" id="token" name="token" required
                       placeholder="Wklej token z e-maila" autocomplete="off">
            </div>

            <div class="form-group">
                <label for="new_password">Nowe hasło:</label>
                <input type="password" id="new_password" name="new_password" required
                       autocomplete="new-password"
                       placeholder="Wpisz nowe hasło">
            </div>

            <div class="form-group">
                <label for="confirm_password">Potwierdź nowe hasło:</label>
                <input type="password" id="confirm_password" name="confirm_password" required
                       autocomplete="new-password"
                       placeholder="Potwierdź nowe hasło">
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Resetowanie hasła...</p>
            </div>

            <button type="submit" class="btn" id="submitBtn">Zresetuj hasło</button>
        </form>

        <div class="links">
            <a href="/login">Wróć do logowania</a>
            <a href="/recover_password_page">Mam token odzyskiwania (rejestracja)</a>
        </div>
    </div>
</body>
</html>
