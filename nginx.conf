server {
    listen 80;
    server_name localhost;

    # Cap request body size (backup import needs headroom; tune as needed).
    # Without this, the only limit is the app's MAX_CONTENT_LENGTH.
    client_max_body_size 512M;

    # Kompresja gzip — istotna zwłaszcza dla dużych odpowiedzi HTML, np. pliku
    # All-in-One serwowanego przez Flask spod /user_files/. Odzyskuje resztę
    # powtarzalności tekstu/Base64, której nie usunął dedup w kompilatorze.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Security headers (HSTS/Referrer-Policy/Permissions-Policy) are emitted by
    # the Flask app (app.py:set_security_headers) so they are present regardless
    # of which proxy fronts the app. HSTS is only sent on HTTPS requests.

    location / {
        # Przekaż żądanie do kontenera z aplikacją Flask/Gunicorn
        # 'app' to nazwa serwisu zdefiniowana w docker-compose.yml
        # Port 5000 to port, który Gunicorn nasłuchuje wewnątrz kontenera
        proxy_pass http://app:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static {
        # Serwuj pliki statyczne bezpośrednio z kontenera Nginx
        # Musimy zdefiniować, gdzie te pliki będą w kontenerze Nginx
        alias /usr/share/nginx/html/static;
    }
}
